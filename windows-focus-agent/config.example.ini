[mqtt]
host = 192.168.1.15
port = 1883
username = windows
; from Bitwarden (the 'windows' MQTT user); do not commit config.ini
password = REPLACE_WITH_WINDOWS_MQTT_PASSWORD
topic = focus/state

[focus]
; method: toasts (default, reliable) | focus_assist (experimental DND) | command
method = toasts
; focus_assist only: 1 = Priority only, 2 = Alarms only
assist_level = 1
; command only: run your own script/exe on each transition
on_command =
off_command =
