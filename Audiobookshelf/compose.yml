services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    environment:
      TZ: Europe/London
    volumes:
      - ./config:/config
      - ./metadata:/metadata
      - /mnt/Elements/media/audiobooks:/audiobooks:ro
    networks:
      - traefik-net
    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik-net
      traefik.http.routers.audiobookshelf.rule: "Host(`audiobookshelf`, `audiobookshelf.svc.home.arpa`)"
      traefik.http.routers.audiobookshelf.entrypoints: web
      traefik.http.services.audiobookshelf.loadbalancer.server.port: "80"
    restart: unless-stopped

networks:
  traefik-net:
    external: true
