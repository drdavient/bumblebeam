server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    charset utf-8;

    # Read-only browse of the video library. nginx serves static files with
    # Range support, so VLC can seek/scrub while streaming.
    location / {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }
}
