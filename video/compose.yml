services:
  # Read-only HTTP view of the video library at http://video/ (browse + Range/seek).
  video:
    image: nginx:1.27-alpine
    container_name: video
    volumes:
      - /mnt/Elements/Video:/usr/share/nginx/html:ro
      - ./nginx-default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - traefik-net
    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik-net
      traefik.http.routers.video.rule: "Host(`video`, `video.svc.home.arpa`)"
      traefik.http.routers.video.entrypoints: web
      traefik.http.services.video.loadbalancer.server.port: "80"
    restart: unless-stopped

networks:
  traefik-net:
    external: true
