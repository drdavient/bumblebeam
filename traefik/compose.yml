services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    ports:
      - "80:80"
      - "443:443"
    environment:
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN:?set CF_DNS_API_TOKEN in traefik/.env}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./letsencrypt:/letsencrypt
    networks:
      gluetun-net:
        gw_priority: 0
      traefik-net:
        gw_priority: 0
      host-services-net:
        ipv4_address: 172.22.0.10
        gw_priority: 100
    restart: unless-stopped

networks:
  gluetun-net:
    external: true
  traefik-net:
    name: traefik-net
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-traefik
    ipam:
      config:
        - subnet: 172.26.0.0/16
          gateway: 172.26.0.1
  host-services-net:
    name: host-services-net
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-host-svc
    ipam:
      config:
        - subnet: 172.22.0.0/24
          gateway: 172.22.0.1
