
services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - VERSION=docker
      - ADVERTISE_IP=http://192.168.1.15:32400/
      - PLEX_PREFER_IPV6=false
      # Uncomment the following line if you have a PLEX_CLAIM in your .env file
      # - PLEX_CLAIM=${PLEX_CLAIM}
    volumes:
      -  "/home/drdavient/docker/plex/PMS:/config"
      - "/mnt/Elements/Video/:/media"
      - "/mnt/Elements/Music:/music"
    restart: unless-stopped
    depends_on:
      mount-waiter:
        condition: service_healthy


  mount-waiter:
    image: alpine
    container_name: mount-waiter
    command: >
      sh -c "
        echo 'Waiting for Elements disk...';
        while true; do
          if [ -f /mnt/Elements/.mount-ok ]; then
            echo 'Real disk mounted';
            tail -f /dev/null;
          fi
          echo 'Still waiting...';
          sleep 5;
        done
      "
    healthcheck:
      test: ["CMD", "sh", "-c", "[ -f /mnt/Elements/.mount-ok ]"]
      interval: 5s
      timeout: 2s
      retries: 20
      start_period: 20s
    volumes:
      - /mnt/Elements:/mnt/Elements:ro
