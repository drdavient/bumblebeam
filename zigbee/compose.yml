services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
    ports:
      # Authenticated + ACL-restricted, so exposed on the LAN for the Windows focus
      # agent. HA reaches it on loopback; Z2M over the internal zigbee-net.
      - "1883:1883"
    networks:
      - zigbee-net

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:latest
    container_name: zigbee2mqtt
    restart: unless-stopped
    depends_on:
      - mosquitto
    volumes:
      - ./zigbee2mqtt/data:/app/data
      - /run/udev:/run/udev:ro
    devices:
      # SONOFF ZBDongle-E (EFR32MG21), stable by-id path -> /dev/ttyUSB0 in-container.
      # Port-independent across container starts; live replug recovery relies on the
      # host-installed udev rule in ./udev/99-zigbee-dongle-replug.rules.
      - "/dev/serial/by-id/usb-Itead_Sonoff_Zigbee_3.0_USB_Dongle_Plus_V2_6cc3bde8ecf0ef118ff6c10a6d9880ab-if00-port0:/dev/ttyUSB0"
    environment:
      - TZ=Europe/London
    networks:
      - zigbee-net
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.z2m.rule=Host(`z2m`, `z2m.svc.home.arpa`)"
      - "traefik.http.routers.z2m.entrypoints=web"
      - "traefik.http.services.z2m.loadbalancer.server.port=8080"

networks:
  # Owned by this stack (new). Traefik-net is consumed external.
  zigbee-net:
    driver: bridge
  traefik-net:
    external: true

volumes:
  # Persist retained MQTT messages (e.g. pomodoro/dnd/state) across broker
  # restarts, so the Windows DND agent self-syncs on connect.
  mosquitto-data:
