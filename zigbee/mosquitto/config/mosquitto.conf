listener 1883
# Authenticated: users are defined in ./config/passwd (hashed via mosquitto_passwd);
# plaintext creds live only in Z2M's Git-ignored config, HA's config entry, and
# Bitwarden. The broker is also bound to 127.0.0.1 only, not exposed to the LAN.
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl
persistence true
persistence_location /mosquitto/data/
autosave_interval 30
log_dest stdout
