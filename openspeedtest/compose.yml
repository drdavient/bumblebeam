services:
  # LAN speed test between any device and Bumblebeam, to localise slowness.
  # Two paths on purpose: host port 3000 measures the direct network path;
  # speedtest.svc.home.arpa goes through Traefik — comparing the two isolates
  # proxy overhead from genuine link problems.
  openspeedtest:
    image: openspeedtest/latest
    container_name: openspeedtest
    ports:
      - "3000:3000"
    networks:
      - traefik-net
    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik-net
      traefik.http.routers.speedtest.rule: "Host(`speedtest`, `speedtest.svc.home.arpa`)"
      traefik.http.routers.speedtest.entrypoints: web
      traefik.http.services.speedtest.loadbalancer.server.port: "3000"
    restart: unless-stopped

networks:
  traefik-net:
    external: true
