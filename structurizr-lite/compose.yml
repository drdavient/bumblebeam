services:
  structurizr:
    image: structurizr/lite
    container_name: structurizr-lite
    ports:
      # Direct port retained until the Structurizr Server handover (task register P3).
      - "8181:8080"
    volumes:
      - ./workspace:/usr/local/structurizr
    networks:
      - traefik-net
    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik-net
      traefik.http.routers.structurizr.rule: "Host(`structurizr`, `structurizr.svc.home.arpa`)"
      traefik.http.routers.structurizr.entrypoints: web
      traefik.http.services.structurizr.loadbalancer.server.port: "8080"
    restart: unless-stopped

networks:
  traefik-net:
    external: true
