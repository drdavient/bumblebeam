services:
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    init: true
    restart: unless-stopped
    environment:
      TZ: Europe/London
    volumes:
      - ./config:/app/config
    networks:
      - traefik-net
      - gluetun-net
    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik-net
      traefik.http.routers.seerr.rule: "Host(`seerr`, `seerr.svc.home.arpa`)"
      traefik.http.routers.seerr.entrypoints: web
      traefik.http.services.seerr.loadbalancer.server.port: "5055"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s

networks:
  traefik-net:
    external: true
  gluetun-net:
    external: true
