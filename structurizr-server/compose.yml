services:
  # Structurizr Server (open-core successor to the archived on-premises product).
  # Multi-workspace publisher replacing single-workspace Lite (register: three-stage
  # migration; Lite retires only after workspace handover is verified).
  # Open core has no native authentication (the licensed build is priced for
  # enterprises) — exposure is LAN/tailnet-only behind Traefik, matching the
  # posture of every other unauthenticated internal service. Traefik basicAuth
  # is the recorded follow-up if a login is wanted.
  structurizr-server:
    build: .
    image: bumblebeam/structurizr-server:oss-9ff1663
    container_name: structurizr-server
    command: server
    # Distroless image defaults to uid 65532; run as the host owner of ./data
    # so workspace files stay drdavient-owned for backup and Git-adjacent ops.
    user: "1000:1000"
    volumes:
      - ./data:/usr/local/structurizr
    networks:
      - traefik-net
    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik-net
      # Includes the retired Lite hostnames so old bookmarks land on the Server.
      traefik.http.routers.structurizr-server.rule: "Host(`structurizr-server`, `structurizr-server.svc.home.arpa`, `structurizr`, `structurizr.svc.home.arpa`)"
      traefik.http.routers.structurizr-server.entrypoints: web
      # Open core has no native auth; Traefik basic-auth fronts the UI instead.
      # Usersfile is gitignored (traefik/users/), included in the Restic set.
      traefik.http.routers.structurizr-server.middlewares: structurizr-auth
      traefik.http.middlewares.structurizr-auth.basicauth.usersfile: /etc/traefik/users/structurizr.htpasswd
      traefik.http.services.structurizr-server.loadbalancer.server.port: "8080"
    restart: unless-stopped

  # Publish-time renderer (Playwright browser for PNG/thumbnail export).
  # profiles: never started by a plain `up`; publish.sh runs it one-shot.
  structurizr-renderer:
    build:
      context: .
      target: renderer
    image: bumblebeam/structurizr-renderer:oss-9ff1663
    profiles: ["render"]

networks:
  traefik-net:
    external: true
