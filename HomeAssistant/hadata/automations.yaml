- id: pomodoro_dnd_fanout
  alias: Pomodoro DND fan-out
  description: >-
    Mirror pomodoro_dnd_state to Android DND (level from pomodoro_dnd_level) and
    retained MQTT state for the Windows DND agent. The legacy focus/state topic is
    dual-published temporarily while Windows clients migrate to pomodoro/dnd/state.
  mode: queued
  trigger:
    - platform: state
      entity_id: binary_sensor.pomodoro_dnd_state
    - platform: homeassistant
      event: start
  variables:
    dnd: "{{ states('binary_sensor.pomodoro_dnd_state') }}"
  condition:
    - condition: template
      value_template: "{{ dnd in ['on', 'off'] }}"
  action:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ dnd == 'on' }}"
          sequence:
            - service: notify.mobile_app_samsung_s25_ultra
              data:
                message: command_dnd
                data:
                  command: "{{ states('input_select.pomodoro_dnd_level') }}"
            - service: mqtt.publish
              data:
                topic: pomodoro/dnd/state
                payload: "on"
                retain: true
            - service: mqtt.publish
              data:
                topic: focus/state
                payload: "on"
                retain: true
      default:
        - service: notify.mobile_app_samsung_s25_ultra
          data:
            message: command_dnd
            data:
              command: "off"
        - service: mqtt.publish
          data:
            topic: pomodoro/dnd/state
            payload: "off"
            retain: true
        - service: mqtt.publish
          data:
            topic: focus/state
            payload: "off"
            retain: true
