- id: pomodoro_focus_fanout
  alias: Pomodoro focus fan-out
  description: >-
    Mirror focus_state to Android DND (level from focus_dnd_level) and a retained
    focus/state topic for the Windows agent. Fires on focus_state change and on HA
    start, so the retained topic is always populated (self-sync after any restart).
  mode: queued
  trigger:
    - platform: state
      entity_id: binary_sensor.focus_state
    - platform: homeassistant
      event: start
  variables:
    focus: "{{ states('binary_sensor.focus_state') }}"
  condition:
    - condition: template
      value_template: "{{ focus in ['on', 'off'] }}"
  action:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ focus == 'on' }}"
          sequence:
            - service: notify.mobile_app_samsung_s25_ultra
              data:
                message: command_dnd
                data:
                  command: "{{ states('input_select.focus_dnd_level') }}"
            - service: mqtt.publish
              data:
                topic: focus/state
                payload: "on"
                retain: true
      default:
        - service: notify.mobile_app_samsung_s25_ultra
          data:
            message: command_dnd
            data:
              command: "off"
        - service: mqtt.publish
          data:
            topic: focus/state
            payload: "off"
            retain: true
