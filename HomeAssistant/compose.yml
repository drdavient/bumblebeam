---
services:
  homeassistant:
    image: lscr.io/linuxserver/homeassistant:latest
    container_name: homeassistant
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./hadata:/config
      - /run/dbus:/run/dbus:ro
    ports:
      - 8123:8123 #optional
    restart: unless-stopped
