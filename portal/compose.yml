services:
  bumblebeam-portal:
    image: nginx:alpine
    container_name: bumblebeam-portal
    restart: unless-stopped
    volumes:
      - ./site:/usr/share/nginx/html:ro
    networks:
      - traefik-net
    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik-net
      traefik.http.routers.bumblebeam.rule: "Host(`bumblebeam`, `bumblebeam.home.arpa`)"
      traefik.http.routers.bumblebeam.entrypoints: web
      traefik.http.services.bumblebeam.loadbalancer.server.port: "80"

networks:
  traefik-net:
    external: true
